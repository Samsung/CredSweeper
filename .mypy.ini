# Global options:

[mypy]
warn_return_any = True
warn_unused_configs = True
strict_optional = False
check_untyped_defs = True

# Per-module options:

[mypy-git.*]
ignore_missing_imports = True

[mypy-lxml.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-onnxruntime.*]
ignore_missing_imports = True

[mypy-whatthepatch.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-base62.*]
ignore_missing_imports = True

[mypy-rpmfile.*]
ignore_missing_imports = True

[mypy-striprtf.*]
ignore_missing_imports = True
