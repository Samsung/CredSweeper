---

version: 1

disable_existing_loggers: False

formatters:
    simple:
        format: "%(asctime)s | %(levelname)s | %(module)s:%(filename)s:%(lineno)d | %(message)s"
    verbose:
        format: "%(asctime)s | %(levelname)s | %(processName)s:%(threadName)s | %(module)s:%(filename)s:%(lineno)s | %(message)s"
        datefmt: '%Y-%m-%dT%H:%M:%S%z'

handlers:
    console:
        class: logging.StreamHandler
        level: INFO
        formatter: simple
        stream: ext://sys.stdout

    debug_log:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: verbose
        filename: ./log/debug.log
        maxBytes: 50485760
        backupCount: 100
        delay: True

    error_log:
        class: logging.handlers.RotatingFileHandler
        level: ERROR
        formatter: verbose
        filename: ./log/error.log
        maxBytes: 10485760
        backupCount: 5

root:
    level: DEBUG
    handlers: [console, error_log]
