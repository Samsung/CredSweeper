# This workflow tests github action feature and integration only after release
# Only static references are allowed in 'uses:', so new packages from a PR are not available

name: ActionTest

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

permissions:
  contents: read

jobs:

  ActionTest:

    runs-on: ubuntu-latest

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4 - 2026.05.21
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 - 2026.06.18
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: CredSweeper action
        # dynamic links are not allowed for 'uses:'
        # may be changed to any tag BUT not to dynamic! e.g.: ${{ github.event.pull_request.head.sha }}
        uses: Samsung/CredSweeper@main # lazy link to the branch for test
        with:
          error: "false"
          hashed: "false"
          subtext: "true"
          severity: "low"
          path: tests/samples

      - name: Verify output
        run: |
          ITEMS_CNT=$(jq '. | length' output.json)
          if [ 100 -lt ${ITEMS_CNT} ]; then
              echo "Samples were successfully scanned"
          else
              echo "Unexpected items count: ${ITEMS_CNT}"
              exit 1
          fi

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 - 2026.04.10
        with:
          name: output.json
          path: output.json
